services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ejas
      POSTGRES_PASSWORD: ejas_local_dev
      POSTGRES_DB: ejas_web
    ports:
      - "5432:5432"
    volumes:
      - ejas_postgres_data:/var/lib/postgresql/data

volumes:
  ejas_postgres_data:
