services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbixo
      POSTGRES_PASSWORD: arbixo_local_dev
      POSTGRES_DB: arbixo
    ports:
      - "5432:5432"
    volumes:
      - arbixo_postgres_data:/var/lib/postgresql/data

volumes:
  arbixo_postgres_data:
